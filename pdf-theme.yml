extends: default

font:
  catalog:
    Noto Sans TC:
      normal: /usr/share/fonts/opentype/noto/NotoSansCJK-Regular.ttc
      bold: /usr/share/fonts/opentype/noto/NotoSansCJK-Bold.ttc
      italic: /usr/share/fonts/opentype/noto/NotoSansCJK-Regular.ttc
      bold_italic: /usr/share/fonts/opentype/noto/NotoSansCJK-Bold.ttc
    Noto Serif TC:
      normal: /usr/share/fonts/opentype/noto/NotoSerifCJK-Regular.ttc
      bold: /usr/share/fonts/opentype/noto/NotoSerifCJK-Bold.ttc
      italic: /usr/share/fonts/opentype/noto/NotoSerifCJK-Regular.ttc
      bold_italic: /usr/share/fonts/opentype/noto/NotoSerifCJK-Bold.ttc

page:
  layout: portrait
  margin: [25mm, 20mm, 25mm, 20mm]
  size: A4

base:
  font-family: Noto Sans TC
  font-size: 11
  line-height-length: 18
  line-height: $base_line_height_length / $base_font_size

heading:
  font-family: Noto Sans TC
  font-color: #1a252f
  h1-font-size: 26
  h2-font-size: 22
  h3-font-size: 18
  h4-font-size: 15
  margin-top: 18
  margin-bottom: 12

title-page:
  align: center
  title:
    top: 35%
    font-size: 36
    font-family: Noto Sans TC
    font-color: #1a252f
    line-height: 1.2
  subtitle:
    font-size: 18
    font-color: #555555
    margin-top: 12
  authors:
    margin-top: 20
    font-size: 14
    font-color: #666666

code:
  font-family: Noto Sans TC
  font-size: 9.5
  background-color: #f6f8fa
  border-color: #e1e4e8
  border-radius: 3
  padding: [6, 8, 6, 8]
  line-height: 1.4

codespan:
  font-family: Noto Sans TC
  font-size: 0.9em
  background-color: #f6f8fa

table:
  border-color: #e1e4e8
  head:
    background-color: #f0f3f6
    font-style: bold
  cell-padding: [5, 8, 5, 8]
  body:
    stripe-background-color: #fafbfc

admonition:
  border-width: 0.5
  border-color: #e1e4e8
  padding: [8, 12, 8, 12]
  label:
    font-style: bold

image:
  align: center

blockquote:
  border-left-width: 3
  border-color: #e1e4e8
  font-color: #555555
  padding: [0, 0, 0, 12]

toc:
  font-family: Noto Sans TC
  dot-leader:
    content: ". "
    font-color: #999999
  h2-font-size: 14
  h3-font-size: 12
  indent: 15
  line-height: 1.6

header:
  height: 0

footer:
  height: 18mm
  font-size: 9
  font-color: #999999
  recto:
    center:
      content: '{page-number}'
  verso:
    center:
      content: '{page-number}'
