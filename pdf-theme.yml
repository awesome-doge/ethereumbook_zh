extends: default

font:
  catalog:
    merge: true
    Noto Sans TC:
      normal: GEM_FONTS_DIR/notosanstc-regular.ttf
      bold: GEM_FONTS_DIR/notosanstc-bold.ttf
      italic: GEM_FONTS_DIR/notosanstc-regular.ttf
      bold_italic: GEM_FONTS_DIR/notosanstc-bold.ttf
    M Plus 1 Code:
      normal: GEM_FONTS_DIR/mplus1code-regular.ttf
      bold: GEM_FONTS_DIR/mplus1code-bold.ttf
      italic: GEM_FONTS_DIR/mplus1code-regular.ttf
      bold_italic: GEM_FONTS_DIR/mplus1code-bold.ttf

page:
  layout: portrait
  margin: [27mm, 20mm, 27mm, 20mm]
  size: A4

base:
  font-family: Noto Sans TC
  font-size: 10.5
  line-height-length: 18
  line-height: $base_line_height_length / $base_font_size
  font-color: #333333

heading:
  font-family: Noto Sans TC
  font-color: #1a252f
  font-style: bold
  h1-font-size: 28
  h2-font-size: 22
  h3-font-size: 17
  h4-font-size: 14
  margin-top: 20
  margin-bottom: 10
  h1-margin-top: 0

title-page:
  align: center
  logo:
    align: center
    top: 10%
  title:
    top: 55%
    font-size: 32
    font-family: Noto Sans TC
    font-style: bold
    font-color: #1a252f
    line-height: 1.2
  subtitle:
    font-size: 16
    font-color: #555555
    margin-top: 10
  authors:
    margin-top: 15
    font-size: 13
    font-color: #666666
  revision:
    margin-top: 5
    font-size: 11
    font-color: #999999

code:
  font-family: M Plus 1 Code
  font-size: 8.5
  background-color: #f6f8fa
  border-color: #e1e4e8
  border-radius: 3
  border-width: 0.5
  padding: [8, 10, 8, 10]
  line-height: 1.4

codespan:
  font-family: M Plus 1 Code
  font-size: 0.85em
  font-color: #333333
  background-color: #f0f2f5

table:
  border-color: #e1e4e8
  border-width: 0.5
  head:
    background-color: #f0f3f6
    font-style: bold
    font-color: #1a252f
  cell-padding: [5, 8, 5, 8]
  body:
    stripe-background-color: #fafbfc

admonition:
  border-width: 0.5
  border-color: #e1e4e8
  padding: [8, 12, 8, 12]
  column-rule-color: #e1e4e8
  label:
    font-style: bold

image:
  align: center

blockquote:
  border-left-width: 3
  border-color: #cccccc
  font-color: #555555
  font-size: 10
  padding: [0, 0, 0, 12]

toc:
  font-family: Noto Sans TC
  dot-leader:
    content: ". "
    font-color: #bbbbbb
  h2-font-size: 12
  h3-font-size: 10.5
  indent: 15
  line-height: 1.5

running-content:
  start-at: toc

header:
  height: 0

footer:
  height: 16mm
  font-size: 8.5
  font-color: #999999
  border-color: #eeeeee
  border-width: 0.5
  recto:
    center:
      content: '{page-number}'
  verso:
    center:
      content: '{page-number}'
