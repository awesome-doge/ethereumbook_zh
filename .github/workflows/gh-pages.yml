name: Publish AsciiDoc to GitHub Pages

on:
  push:
    branches:
      - master

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Setup Ruby
      uses: ruby/setup-ruby@v1
      with:
        ruby-version: '3.3'

    - name: Install Asciidoctor
      run: |
        gem install asciidoctor -v '~> 2.0'
        gem install rouge

    - name: Convert AsciiDoc to HTML
      run: |
        # 生成 Rouge 語法高亮 CSS
        rougify style github > rouge-github.css
        # 構建單頁 HTML
        asciidoctor -b html5 -a stylesheet=custom.css -a linkcss -D output book.asciidoc
        # 分割為多頁（生成 index.html, ch*.html, all.html, sitemap.xml）
        python3 scripts/split-html.py output

    - name: Optimize Images
      run: |
        sudo apt-get update -qq
        sudo apt-get install -y -qq pngquant optipng
        mkdir -p output/images
        for f in images/*.png; do
          pngquant --quality=65-80 --speed 1 --output "output/$f" "$f" 2>/dev/null || cp "$f" "output/$f"
          optipng -quiet -o2 "output/$f" 2>/dev/null || true
        done
        # Copy non-PNG files as-is
        for f in images/*.jpg images/*.svg images/*.jpeg images/*.gif; do
          [ -f "$f" ] && cp "$f" "output/$f" || true
        done

    - name: Copy CSS
      run: |
        cp custom.css output/
        cp rouge-github.css output/

    - name: Create CNAME File
      run: echo 'mastering-ethereum.doge.tg' > output/CNAME

    - name: Generate robots.txt
      run: |
        cat > output/robots.txt << 'EOF'
        User-agent: *
        Allow: /
        Sitemap: https://mastering-ethereum.doge.tg/sitemap.xml
        EOF
        sed -i 's/^        //' output/robots.txt

    - name: Deploy to GitHub Pages
      uses: peaceiris/actions-gh-pages@v4
      with:
        github_token: ${{ secrets.GITHUB_TOKEN }}
        publish_dir: ./output
