name: Publish AsciiDoc to GitHub Pages

on:
  push:
    branches:
      - master

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Setup Ruby
      uses: ruby/setup-ruby@v1
      with:
        ruby-version: '3.3'

    - name: Install Asciidoctor
      run: |
        gem install asciidoctor -v '~> 2.0'
        gem install rouge

    - name: Convert AsciiDoc to HTML
      run: |
        # 生成 Rouge 語法高亮 CSS
        rougify style github > rouge-github.css
        asciidoctor -b html5 -a stylesheet=custom.css -a linkcss -D output book.asciidoc
        mv output/book.html output/index.html

    - name: Optimize Images
      run: |
        sudo apt-get update -qq
        sudo apt-get install -y -qq pngquant optipng
        mkdir -p output/images
        for f in images/*.png; do
          pngquant --quality=65-80 --speed 1 --output "output/$f" "$f" 2>/dev/null || cp "$f" "output/$f"
          optipng -quiet -o2 "output/$f" 2>/dev/null || true
        done
        # Copy non-PNG files as-is
        for f in images/*.jpg images/*.svg images/*.jpeg images/*.gif; do
          [ -f "$f" ] && cp "$f" "output/$f" || true
        done

    - name: Copy CSS
      run: |
        cp custom.css output/
        cp rouge-github.css output/

    - name: Create CNAME File
      run: echo 'mastering-ethereum.doge.tg' > output/CNAME

    - name: Generate SEO Files
      run: |
        # robots.txt
        cat > output/robots.txt << 'ROBOTS'
        User-agent: *
        Allow: /
        Sitemap: https://mastering-ethereum.doge.tg/sitemap.xml
        ROBOTS
        sed -i 's/^        //' output/robots.txt

        # sitemap.xml
        LASTMOD=$(date -u +%Y-%m-%d)
        cat > output/sitemap.xml << SITEMAP
        <?xml version="1.0" encoding="UTF-8"?>
        <urlset xmlns="http://www.sitemaps.org/schemas/sitemap/0.9">
          <url>
            <loc>https://mastering-ethereum.doge.tg/</loc>
            <lastmod>${LASTMOD}</lastmod>
            <changefreq>monthly</changefreq>
            <priority>1.0</priority>
          </url>
        </urlset>
        SITEMAP
        sed -i 's/^        //' output/sitemap.xml

    - name: Deploy to GitHub Pages
      uses: peaceiris/actions-gh-pages@v4
      with:
        github_token: ${{ secrets.GITHUB_TOKEN }}
        publish_dir: ./output
