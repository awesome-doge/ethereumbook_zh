name: Build & Release eBooks

on:
  push:
    tags:
      - 'v*'

jobs:
  build-ebooks:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Setup Ruby
      uses: ruby/setup-ruby@v1
      with:
        ruby-version: '3.3'

    - name: Install Dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y fonts-noto-cjk fonts-noto-cjk-extra python3-fonttools
        gem install asciidoctor -v '~> 2.0'
        gem install asciidoctor-pdf -v '~> 2.3'
        gem install asciidoctor-epub3 -v '~> 2.1'
        gem install rouge

    - name: Extract CJK Fonts
      run: |
        FONT_DIR="$(gem environment gemdir)/gems/asciidoctor-pdf-$(gem list asciidoctor-pdf --exact | grep -oE '[0-9]+\.[0-9]+\.[0-9]+')/data/fonts"
        echo "FONT_DIR=$FONT_DIR"
        python3 scripts/extract-cjk-fonts.py "$FONT_DIR"
        cp "$FONT_DIR/notosanstc-regular.ttf" "$FONT_DIR/mplus1code-regular.ttf"
        cp "$FONT_DIR/notosanstc-bold.ttf" "$FONT_DIR/mplus1code-bold.ttf"
        ls -lh "$FONT_DIR"/notosanstc-* "$FONT_DIR"/mplus1code-*

    - name: Build PDF
      run: |
        mkdir -p output
        # 先用自訂主題嘗試
        asciidoctor-pdf \
          -a pdf-theme=pdf-theme.yml \
          -a pdf-fontsdir=GEM_FONTS_DIR \
          -a scripts=cjk \
          -a allow-uri-read \
          -a front-cover-image=image:cover.jpg[fit=contain] \
          -D output book.asciidoc 2>&1 | tee /tmp/pdf-build.log
        mv output/book.pdf "output/Mastering-Ethereum-Traditional-Chinese.pdf"
        # 驗證 PDF 有文字內容
        PAGE_COUNT=$(grep -c '/Type /Page' output/Mastering-Ethereum-Traditional-Chinese.pdf || echo 0)
        FILE_SIZE=$(stat -c%s output/Mastering-Ethereum-Traditional-Chinese.pdf)
        echo "Pages: $PAGE_COUNT, Size: $FILE_SIZE bytes"

    - name: Build EPUB
      run: |
        # 複製 gem 預設樣式並附加自訂覆蓋
        EPUB_STYLES="$(gem environment gemdir)/gems/asciidoctor-epub3-$(gem list asciidoctor-epub3 --exact | grep -oE '[0-9]+\.[0-9]+\.[0-9]+')/data/styles"
        cp -r "$EPUB_STYLES" epub-build-styles
        cat epub-styles/epub3-css3-only.css >> epub-build-styles/epub3-css3-only.scss
        asciidoctor-epub3 \
          -a ebook-cover-image=cover.jpg \
          -a epub3-stylesdir=epub-build-styles \
          -D output book.asciidoc
        mv output/book.epub "output/Mastering-Ethereum-Traditional-Chinese.epub"

    - name: Upload Artifacts
      uses: actions/upload-artifact@v4
      with:
        name: ebooks
        path: output/Mastering-Ethereum-Traditional-Chinese.*

    - name: Create Release
      uses: softprops/action-gh-release@v2
      with:
        name: "${{ github.ref_name }} — 精通以太坊 繁體中文版"
        files: |
          output/Mastering-Ethereum-Traditional-Chinese.pdf
          output/Mastering-Ethereum-Traditional-Chinese.epub
        body: |
          ## 精通以太坊 — Mastering Ethereum 繁體中文版

          由 Andreas M. Antonopoulos 和 Gavin Wood 著作，Dr. Awesome Doge 翻譯。

          ### 下載
          - **PDF** — 適合電腦、平板閱讀和列印 (A4)
          - **EPUB** — 適合電子書閱讀器 (Kindle, Apple Books, Kobo 等)

          ### 線上閱讀
          [mastering-ethereum.doge.tg](https://mastering-ethereum.doge.tg/)
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
