<style>
/* 浮動目錄按鈕 */
.toc-toggle {
  position: fixed;
  bottom: 5rem;
  right: 1.5rem;
  width: 48px;
  height: 48px;
  border-radius: 50%;
  background: #3498db;
  color: #fff;
  border: none;
  font-size: 1.3rem;
  cursor: pointer;
  box-shadow: 0 2px 8px rgba(0,0,0,0.2);
  z-index: 1000;
  display: flex;
  align-items: center;
  justify-content: center;
  transition: background 0.2s;
}
.toc-toggle:hover { background: #2980b9; }

/* 回到頂部按鈕 */
.back-to-top {
  position: fixed;
  bottom: 1.5rem;
  right: 1.5rem;
  width: 48px;
  height: 48px;
  border-radius: 50%;
  background: #555;
  color: #fff;
  border: none;
  font-size: 1.3rem;
  cursor: pointer;
  box-shadow: 0 2px 8px rgba(0,0,0,0.2);
  z-index: 1000;
  display: none;
  align-items: center;
  justify-content: center;
  transition: background 0.2s, opacity 0.3s;
}
.back-to-top:hover { background: #333; }
.back-to-top.visible { display: flex; }

/* 浮動目錄面板 */
.toc-panel {
  position: fixed;
  top: 0;
  right: -360px;
  width: 340px;
  max-width: 85vw;
  height: 100vh;
  background: #fff;
  border-left: 1px solid #e1e4e8;
  box-shadow: -4px 0 16px rgba(0,0,0,0.1);
  z-index: 1001;
  transition: right 0.3s ease;
  overflow-y: auto;
  padding: 1.5rem;
}
.toc-panel.open { right: 0; }

.toc-panel h3 {
  margin: 0 0 1rem;
  font-size: 1.2rem;
  color: #1a252f;
  border-bottom: 1px solid #e1e4e8;
  padding-bottom: 0.5rem;
}

.toc-panel .close-btn {
  position: absolute;
  top: 1rem;
  right: 1rem;
  background: none;
  border: none;
  font-size: 1.4rem;
  cursor: pointer;
  color: #666;
}

.toc-panel ul {
  list-style: none;
  padding: 0;
  margin: 0;
}

.toc-panel ul ul {
  padding-left: 1rem;
}

.toc-panel li {
  margin: 0.2rem 0;
}

.toc-panel a {
  color: #2c3e50;
  text-decoration: none;
  font-size: 0.92rem;
  line-height: 1.6;
  display: block;
  padding: 0.15rem 0.4rem;
  border-radius: 4px;
  transition: background 0.15s;
}

.toc-panel a:hover {
  background: #f0f3f6;
  color: #3498db;
}

/* 遮罩 */
.toc-overlay {
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  background: rgba(0,0,0,0.3);
  z-index: 1000;
  display: none;
}
.toc-overlay.visible { display: block; }

/* 閱讀進度條 */
.reading-progress {
  position: fixed;
  top: 0;
  left: 0;
  height: 3px;
  background: #3498db;
  z-index: 1002;
  transition: width 0.1s;
}

/* 手機適配 */
@media screen and (max-width: 768px) {
  .toc-toggle, .back-to-top {
    width: 42px;
    height: 42px;
    font-size: 1.1rem;
  }
  .toc-toggle { bottom: 4.5rem; right: 1rem; }
  .back-to-top { bottom: 1rem; right: 1rem; }
}
</style>

<!-- 閱讀進度條 -->
<div class="reading-progress" id="readingProgress"></div>

<!-- 浮動按鈕 -->
<button class="toc-toggle" id="tocToggle" title="目錄">&#9776;</button>
<button class="back-to-top" id="backToTop" title="回到頂部">&#8593;</button>

<!-- 目錄面板 -->
<div class="toc-overlay" id="tocOverlay"></div>
<div class="toc-panel" id="tocPanel">
  <button class="close-btn" id="tocClose">&times;</button>
  <h3>目錄</h3>
  <div id="tocContent"></div>
</div>

<script>
(function() {
  // 生成目錄
  var tocContent = document.getElementById('tocContent');
  var headings = document.querySelectorAll('h2, h3');
  if (headings.length > 0 && tocContent) {
    var ul = document.createElement('ul');
    var currentH2Li = null;
    var currentSubUl = null;
    headings.forEach(function(h) {
      if (!h.id) {
        h.id = h.textContent.trim().replace(/\s+/g, '-').replace(/[^\w\u4e00-\u9fff-]/g, '').substring(0, 60);
      }
      var li = document.createElement('li');
      var a = document.createElement('a');
      a.href = '#' + h.id;
      a.textContent = h.textContent.trim();
      a.addEventListener('click', function() { closeToc(); });
      li.appendChild(a);
      if (h.tagName === 'H2') {
        ul.appendChild(li);
        currentH2Li = li;
        currentSubUl = null;
      } else if (h.tagName === 'H3' && currentH2Li) {
        if (!currentSubUl) {
          currentSubUl = document.createElement('ul');
          currentH2Li.appendChild(currentSubUl);
        }
        currentSubUl.appendChild(li);
      }
    });
    tocContent.appendChild(ul);
  }

  // 目錄開關
  var tocToggle = document.getElementById('tocToggle');
  var tocPanel = document.getElementById('tocPanel');
  var tocOverlay = document.getElementById('tocOverlay');
  var tocClose = document.getElementById('tocClose');

  function openToc() {
    tocPanel.classList.add('open');
    tocOverlay.classList.add('visible');
  }
  function closeToc() {
    tocPanel.classList.remove('open');
    tocOverlay.classList.remove('visible');
  }

  tocToggle.addEventListener('click', openToc);
  tocOverlay.addEventListener('click', closeToc);
  tocClose.addEventListener('click', closeToc);

  // 回到頂部
  var backToTop = document.getElementById('backToTop');
  backToTop.addEventListener('click', function() {
    window.scrollTo({ top: 0, behavior: 'smooth' });
  });

  // 閱讀進度條
  var progressBar = document.getElementById('readingProgress');

  window.addEventListener('scroll', function() {
    var scrollTop = window.pageYOffset || document.documentElement.scrollTop;
    var docHeight = document.documentElement.scrollHeight - document.documentElement.clientHeight;

    // 回到頂部按鈕顯示/隱藏
    if (scrollTop > 300) {
      backToTop.classList.add('visible');
    } else {
      backToTop.classList.remove('visible');
    }

    // 進度條
    if (docHeight > 0) {
      var progress = (scrollTop / docHeight) * 100;
      progressBar.style.width = progress + '%';
    }
  });
})();
</script>
